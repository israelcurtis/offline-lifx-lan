<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>LIFX LAN Controller</title>
	<link rel="stylesheet" href="/styles.css" />
</head>

<body>
	<main class="app-shell">
		<section class="hero">
			<p class="eyebrow">Offline Instant Control, no Cloud Necessary</p>
			<h1>LIFX LAN Controller</h1>
		</section>
		<section class="section-header">
			<div>
				<h2>Preset Scenes</h2>
			</div>
		</section>
		<section>
			<div id="scene-grid" class="scene-grid"></div>
		</section>
		<section class="status-panel">
			<div class="status-header">
				<div>
					<p class="panel-label">Controller Status</p>
					<p id="status-text">Loading...</p>
					<p id="activity-text" class="activity-text" hidden></p>
				</div>
				<div class="status-actions">
					<button id="restart-button" class="ghost-button">Restart Server</button>
					<button id="discover-button" class="ghost-button">Rescan LAN</button>
				</div>
			</div>
			<div class="metrics">
				<div class="metric transition-control">
					<div class="transition-control-header">
						<label class="metric-label" for="brightness-slider">Manual Brightness</label>
						<strong id="brightness-value">--</strong>
					</div>
					<input id="brightness-slider" class="transition-slider" type="range" min="0" max="100" step="1" value="0" />
				</div>
				<div class="metric transition-control">
					<div class="transition-control-header">
						<label class="metric-label" for="transition-duration-slider">Transition Duration</label>
						<strong id="transition-duration-value">1000ms</strong>
					</div>
					<input id="transition-duration-slider" class="transition-slider" type="range" min="0" max="5000" step="100" value="1000" />
				</div>
				<div class="metric">
					<span class="metric-label">Enabled</span>
					<strong id="targeted-count">0</strong>
				</div>
				<div class="metric">
					<span class="metric-label">Online</span>
					<strong id="online-count">0</strong>
				</div>
			</div>
			<p id="warning-text" class="warning-text" hidden></p>
		</section>
		<section class="section-header">
			<div>
				<h2>Devices</h2>
			</div>
		</section>
		<section>
			<div id="light-grid" class="light-grid"></div>
		</section>
	</main>
	<script type="module" src="/app.js"></script>
</body>

</html>
